name: release
on:
  push:
    tags: ['v*']
permissions:
  contents: write     # for creating the GitHub Release
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper jar
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.10.2
          fi

      - name: Verify tag matches project version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER=$(./gradlew -q properties --no-daemon | awk '/^version:/ {print $2}')
          echo "tag=$TAG project=$VER"
          test "$TAG" = "$VER" || { echo "tag/version mismatch"; exit 1; }

      - name: Build and test
        run: ./gradlew build test --no-daemon

      # Signs and uploads to Maven Central via the Sonatype Central Portal,
      # then auto-releases the deployment.
      - name: Publish to Maven Central (Central Portal)
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew publishAndReleaseToMavenCentral --no-daemon --no-configuration-cache

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
